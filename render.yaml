
# Deploys the two Python (FastAPI) services on Render's free plan + a free
# Redis (Key Value) instance. Postgres stays on Neon's free tier (external —
# Render no longer offers a free managed Postgres plan), set via sync:false
# env vars below.
# The 3 Next.js frontends go to Vercel (see packages/*/vercel.json), NOT here.
#
# Setup:
#   1. Push this repo to GitHub.
#   2. Render Dashboard → New → Blueprint → pick this repo.
#   3. Fill the env vars marked `sync: false` (secrets) in the dashboard,
#      including DATABASE_URL / DIRECT_URL / APP_DATABASE_URL from Neon.
#   4. In the Neon SQL console, run once: CREATE EXTENSION IF NOT EXISTS vector;
#
# Free-tier tradeoff: both web services spin down after ~15 min idle and take
# a slow cold start (30-60s) on the next request — fine for a demo, noticeable
# for real users. Render's exact free-tier limits change over time; verify
# current numbers in the dashboard before relying on them.
#
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ── Redis (Key Value) — free plan, used only for OTP email verification.
  # Degrades gracefully if unavailable (see src/config/database.py) so this
  # is optional, but it's free, so there's no reason to drop it.
  - type: keyvalue
    name: eventai-redis
    plan: free
    ipAllowList: []             # only reachable from Render private network

  # ── Backend API (FastAPI) ──────────────────────────────────
  - type: web
    name: eventai-backend
    runtime: docker
    dockerfilePath: packages/backend/Dockerfile
    dockerContext: packages/backend
    plan: free
    healthCheckPath: /api/v1/health
    # Note: preDeployCommand not supported on free tier - run migrations manually after first deploy
    envVars:
      - key: DATABASE_URL
        sync: false               # Neon pooled connection string
      - key: DIRECT_URL
        sync: false               # Neon direct (unpooled) connection string — Alembic only
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: eventai-redis
          property: connectionString
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: eventai-orchestrator
          property: hostport      # internal host:port
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: AI_SERVICE_API_KEY
        sync: false               # must match orchestrator's value
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false               # https://eventai-backend.onrender.com/api/v1/auth/google/callback
      - key: CORS_ORIGINS
        sync: false               # comma-separated prod Vercel domains
      - key: FRONTEND_URL
        sync: false
      # Email (Brevo)
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Object storage (R2 / S3)
      - key: CDN_PROVIDER
        value: r2
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto

  # ── AI Orchestrator (FastAPI) ──────────────────────────────
  - type: web
    name: eventai-orchestrator
    runtime: docker
    dockerfilePath: packages/agentic_event_orchestrator/Dockerfile
    dockerContext: packages/agentic_event_orchestrator
    plan: free
    healthCheckPath: /health
    # Note: preDeployCommand not supported on free tier - run migrations manually after first deploy
    envVars:
      - key: DATABASE_URL
        sync: false               # same Neon pooled connection string as backend
      - key: APP_DATABASE_URL
        sync: false               # same value as DATABASE_URL above
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: eventai-redis
          property: connectionString
      - key: BACKEND_API_URL
        fromService:
          type: web
          name: eventai-backend
          property: hostport
      - key: AI_SERVICE_API_KEY
        sync: false               # must match backend's value
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini/gemini-2.5-flash
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: MEM0_API_KEY
        sync: false
      - key: CHAINLIT_AUTH_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
