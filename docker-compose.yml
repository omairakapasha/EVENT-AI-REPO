services:

  # ── FastAPI Backend (Python / uv) ──────────────────────────────────────────
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: event-ai-backend
    restart: unless-stopped
    env_file: ./packages/backend/.env
    environment:
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGINS: '["http://localhost:3001","http://localhost:3000"]'
      GOOGLE_REDIRECT_URI: http://localhost:5000/api/v1/auth/google/callback
    ports:
      - "5000:5000"
    networks:
      - public
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health/db')"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Vendor Portal (Next.js) ────────────────────────────────────────────────
  vendor:
    build:
      context: ./packages/vendor
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    container_name: event-ai-vendor
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3001:3000"
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  public:
    driver: bridge
