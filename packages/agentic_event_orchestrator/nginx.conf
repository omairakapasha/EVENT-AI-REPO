server {
    listen 80;
    server_name _;

    # HTTPS redirect — all HTTP traffic forced to HTTPS
    # Fixes Gap #5: No transport encryption
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL certificates (use Let's Encrypt in production)
    ssl_certificate     /etc/ssl/certs/eventai.crt;
    ssl_certificate_key /etc/ssl/private/eventai.key;

    # Modern TLS only — no TLS 1.0/1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS — force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers — fixes CSRF exposure
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hide server version
    server_tokens off;

    # ── Next.js User Portal (port 3000) ──────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Request size limit — prevents large payload attacks
        client_max_body_size 1m;
    }

    # ── Python Agent Service (internal only — NOT exposed externally) ──
    # The agent service should ONLY be reachable from localhost.
    # Do NOT proxy /api/agent/* externally — it's called server-side by Next.js only.
    location /api/agent/ {
        # Block all external access — agent service is internal
        deny all;
        return 403 "Agent service is internal only.";
    }

    # ── Next.js Admin Portal (port 3002) ─────────────────────────
    location /admin {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extra restriction: admin only from internal IPs
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Backend API (port 5000) ───────────────────────────────────
    location /api/v1/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5m;
    }

    # ── Rate limiting at nginx level (belt-and-suspenders) ───────
    # 60 requests per minute per IP across all endpoints
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
    limit_req zone=global burst=20 nodelay;
    limit_req_status 429;
}
