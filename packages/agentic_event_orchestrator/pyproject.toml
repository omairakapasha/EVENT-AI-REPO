[project]
name = "agentic-event-orchestrator"
version = "0.1.0"
description = "AI Agent Orchestrator for Event Management"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.1",
    "uvicorn[standard]>=0.47.0",
    "openai-agents>=0.17.2",
    "openai>=2.37.0",
    "httpx>=0.28.1",
    "asyncpg>=0.31.0",
    "sqlmodel>=0.0.38",
    "alembic>=1.18.4",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.1",
    "pyyaml>=6.0",
    "sse-starlette>=3.4.4",
    "mem0ai>=2.0.2",
    "scikit-learn>=1.4.0",
    # sentence-transformers is optional (Layer 5 semantic similarity)
    # adds ~80MB model download on first use, CPU-only, no CUDA needed
    # "sentence-transformers>=3.0.0",
    # llamafirewall excluded — requires torch/CUDA (~2GB). Regex+heuristic layers active instead.
    # Re-add when running on GPU-enabled infra: "llamafirewall>=0.1.0"
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["config", "models", "pipeline", "routers", "services", "tools", "database", "scheduler", "nlp_processor", "vendor_integration"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "aiosqlite",
    "respx",
    "hypothesis",
    "ruff",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
