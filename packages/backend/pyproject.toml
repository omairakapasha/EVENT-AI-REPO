[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "alembic>=1.18.4",
    "asyncpg>=0.31.0",
    "fastapi>=0.135.3",
    "pydantic-settings>=2.13.1",
    "sqlmodel>=0.0.38",
    "structlog>=25.5.0",
    "ujson>=5.12.0",
    "uvicorn>=0.44.0",
    # Auth dependencies
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "slowapi>=0.1.9",
    "pydantic[email]>=2.12.5",
    "python-multipart>=0.0.24",
    "httpx>=0.28.1",
    "google-auth>=2.49.2",
    "requests>=2.33.1",
    "pgvector>=0.3.6",
    "redis[hiredis]>=5.0.0",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "aiosqlite",
    "pytest-cov",
    "hypothesis>=6.112.0",
    "respx>=0.21.1",
    "fakeredis>=2.20.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
